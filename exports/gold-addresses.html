<style>

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .controls input,.controls select{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:6px;font:inherit}
  .controls input:focus,.controls select:focus{outline:none;border-color:var(--accent)}
  .stats{color:var(--mute);font-size:12px;margin-left:auto}
  .stats b{color:var(--gold)}
  main{padding:0 20px 40px}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th{position:sticky;top:84px;background:var(--panel);text-align:left;font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--mute)}

  th .arrow{opacity:.5;margin-left:4px;font-size:10px}
  td{padding:10px 12px;border-bottom:1px solid var(--line)}
  tr:hover td{background:var(--panel)}
  .state{font-weight:600;letter-spacing:.5px}
  .state.sales-free{color:var(--sales-free)}
  .state.income-free{color:var(--income-free)}
  .state.both-free{color:var(--both-free)}

  .empty{text-align:center;color:var(--mute);padding:40px;font-style:italic}

let sortKey='state', sortDir=1;

const tbody = document.getElementById('tbody');
const stateFilter = document.getElementById('stateFilter');
const taxFilter = document.getElementById('taxFilter');
const regionFilter = document.getElementById('regionFilter');
const priceFilter = document.getElementById('priceFilter');
const search = document.getElementById('search');
const count = document.getElementById('count');
const empty = document.getElementById('empty');

function taxTag(s){
  const sf = SALES_FREE.includes(s), inf = INCOME_FREE.includes(s);
  if (sf && inf) return ' 🩷 两税免';
  if (sf)  return ' 🟢 免消费税';
  if (inf) return ' 🟡 免所得税';
  return '';
}

// build state options
const states = [...new Set(data.map(d=>d.state))].sort();
for (const s of states) {
  const o = document.createElement('option');
  o.value = s; o.textContent = s + taxTag(s);
  stateFilter.appendChild(o);
}

function priceClass(p){
  if (p <= 10) return 'low';
  if (p > 25) return 'high';
  return '';
}

function gmapsUrl(addr){
  return 'https://www.google.com/maps/place/' + encodeURIComponent(addr);
}
function streetUrl(addr){
  return 'https://www.google.com/maps?q=&layer=c&cbll=&q=' + encodeURIComponent(addr);
}

function render(){
  const q = search.value.trim().toLowerCase();
  const fs = stateFilter.value;
  const ft = taxFilter.value;
  const fr = regionFilter.value;
  const fp = priceFilter.value;

  let rows = data.filter(d=>{
    if (fs && d.state !== fs) return false;
    if (ft === 'sales-free'  && !SALES_FREE.includes(d.state)) return false;
    if (ft === 'income-free' && !INCOME_FREE.includes(d.state)) return false;
    if (ft === 'both-free'   && !BOTH_FREE.includes(d.state)) return false;
    if (ft === 'any-free'    && !TAX_FREE.includes(d.state)) return false;
    if (ft === 'taxed'       && TAX_FREE.includes(d.state)) return false;
    if (fr && !(REGION[fr]||[]).includes(d.state)) return false;
    if (fp === 'cheap' && d.monthly_price > 10) return false;
    if (fp === 'mid' && (d.monthly_price <= 10 || d.monthly_price > 20)) return false;
    if (fp === 'exp' && d.monthly_price <= 20) return false;
    if (q && !(d.state.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.full_address.toLowerCase().includes(q))) return false;
    return true;
  });

  rows.sort((a,b)=>{
    let A,B;
    if (sortKey === 'price') { A=a.monthly_price; B=b.monthly_price; }
    else if (sortKey === 'address') { A=a.full_address; B=b.full_address; }
    else { A=a[sortKey]; B=b[sortKey]; }
    if (A < B) return -1*sortDir;
    if (A > B) return 1*sortDir;
    return 0;
  });

  count.textContent = rows.length;
  tbody.innerHTML = '';
  if (rows.length === 0) { empty.style.display='block'; return; } else empty.style.display='none';

  for (const d of rows) {
    const tr = document.createElement('tr');
    const sf  = SALES_FREE.includes(d.state);
    const inf = INCOME_FREE.includes(d.state);
    const both = sf && inf;
    const stateClass = both ? 'both-free' : sf ? 'sales-free' : inf ? 'income-free' : '';
    const isWest = REGION.west.includes(d.state);
    tr.innerHTML = `
      <td class="state ${stateClass}">
        ${d.state}
        ${both?'<span class="badge both-free">两税免</span>':
          sf?'<span class="badge sales-free">免消费税</span>':
          inf?'<span class="badge income-free">免所得税</span>':''}
        ${isWest?'<span class="badge west">西岸</span>':''}
      </td>
      <td class="city">${d.city}</td>
      <td class="addr">${d.full_address}</td>
      <td class="price ${priceClass(d.monthly_price)}">$${d.monthly_price.toFixed(2)}</td>
      <td>
        <a class="btn maps" href="${gmapsUrl(d.full_address)}" target="_blank">🗺️ 地图</a>
        <a class="btn street" href="${streetUrl(d.full_address)}" target="_blank">📷 街景</a>
        <a class="btn atmb" href="${d.detail_url}" target="_blank">🏠 ATMB</a>
      </td>`;
    tbody.appendChild(tr);
  }
}

document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click',()=>{
    const k = th.dataset.sort;
    if (sortKey === k) sortDir = -sortDir; else { sortKey=k; sortDir=1; }
    render();
  });
});

[search, stateFilter, taxFilter, regionFilter, priceFilter].forEach(el => el.addEventListener('input', render));

render();
</script>
</body>
</html>
